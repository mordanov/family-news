version: '3.8'

# Local development compose.
# In production the backend and frontend are built from web-folders/docker-compose.yaml,
# which uses the shared recipes-db postgres instance.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEWS_POSTGRES_DB:-news}
      POSTGRES_USER: ${NEWS_POSTGRES_USER:-news_user}
      POSTGRES_PASSWORD: ${NEWS_POSTGRES_PASSWORD:-news_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEWS_POSTGRES_USER:-news_user} -d ${NEWS_POSTGRES_DB:-news}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${NEWS_POSTGRES_USER:-news_user}:${NEWS_POSTGRES_PASSWORD:-news_dev_password}@postgres:5432/${NEWS_POSTGRES_DB:-news}
      SECRET_KEY: ${NEWS_SECRET_KEY:-dev-secret-key}
      PHOTOS_DIR: /app/photos
      THUMBNAILS_DIR: /app/photos/thumbnails
      USER1_LOGIN: ${NEWS_USER1_LOGIN:-admin}
      USER1_PASSWORD: ${NEWS_USER1_PASSWORD:-admin123}
      USER2_LOGIN: ${NEWS_USER2_LOGIN:-user}
      USER2_PASSWORD: ${NEWS_USER2_PASSWORD:-user123}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
    volumes:
      - photos_data:/app/photos
      - ${FIREBASE_CREDENTIALS_PATH:-/dev/null}:/app/firebase-credentials.json:ro
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - photos_data:/photos:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

volumes:
  postgres_data:
  photos_data:

networks:
  app_network:
    driver: bridge
