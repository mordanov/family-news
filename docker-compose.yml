version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsfeed}
      POSTGRES_USER: ${POSTGRES_USER:-newsfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsfeed123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsfeed}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-newsfeed}:${POSTGRES_PASSWORD:-newsfeed123}@postgres:5432/${POSTGRES_DB:-newsfeed}
      PHOTOS_DIR: /app/photos
      THUMBNAILS_DIR: /app/photos/thumbnails
    volumes:
      - photos_data:/app/photos
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - photos_data:/photos:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

volumes:
  postgres_data:
  photos_data:

networks:
  app_network:
    driver: bridge
