name: Android Build

# Собирает debug APK и прикладывает артефакт. Подпись release для Play Console
# настраивается отдельно (keystore + secrets).

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

permissions:
  contents: read

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Unit tests
        run: chmod +x gradlew && ./gradlew testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-news-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
