name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run frontend tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_NEWS_DIR: ${{ secrets.VPS_NEWS_DIR }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_NEWS_DIR' '$VPS_WEB_FOLDERS_DIR'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          NEWS_DIR="${3:-$HOME/family-news}"
          WEB_FOLDERS_DIR="${4:-$HOME/web-folders}"

          PREVIOUS_COMMIT=""

          # --- Update family-news repo ---
          mkdir -p "$NEWS_DIR"
          cd "$NEWS_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          # --- Rebuild shared stack from web-folders ---
          cd "$WEB_FOLDERS_DIR"

          NEWS_HTTP_HOST="${NEWS_PRIMARY_DOMAIN:-news.mainpage.ru}"

          debug_dump() {
            docker compose ps || true
            docker compose logs --no-color --tail=200 news-backend || true
            docker compose logs --no-color --tail=200 news-frontend || true
            docker compose logs --no-color --tail=200 nginx || true
            docker compose logs --no-color --tail=200 recipes-db || true
          }

          wait_for_news_health() {
            local retries=60
            local delay=2

            echo "Waiting for news service via nginx (Host: ${NEWS_HTTP_HOST})..."
            for ((i=1; i<=retries; i++)); do
              if curl -fsS -H "Host: ${NEWS_HTTP_HOST}" http://localhost/api/health > /dev/null 2>&1; then
                echo "Health check passed"
                return 0
              fi
              sleep "$delay"
            done

            echo "Health check failed after $((retries * delay))s"
            return 1
          }

          echo "Building containers..."
          docker compose build news-backend news-frontend nginx
          docker compose up -d --remove-orphans

          if ! wait_for_news_health; then
            echo "Health check failed -> rollback"
            debug_dump

            if [ -n "$PREVIOUS_COMMIT" ]; then
              cd "$NEWS_DIR"
              git reset --hard "$PREVIOUS_COMMIT"
              cd "$WEB_FOLDERS_DIR"
              docker compose build news-backend news-frontend nginx
              docker compose up -d --remove-orphans

              if wait_for_news_health; then
                echo "Rollback recovered service successfully"
              else
                echo "Rollback completed, but service is still unhealthy"
                debug_dump
              fi
            fi

            exit 1
          fi

          docker compose ps
          EOF

      - name: Deploy notification
        if: success()
        run: echo "✅ Deployment to ${{ secrets.VPS_HOST }} completed successfully!"

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ Deployment failed!"

